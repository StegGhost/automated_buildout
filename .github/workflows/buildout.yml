name: Buildout

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  buildout:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${PYTHONPATH}:$(pwd)" >> $GITHUB_ENV

      - name: Run buildout
        run: python run_buildout.py

      - name: Clean pycache
        run: |
          find . -name "__pycache__" -type d -exec rm -rf {} +
          find . -name "*.pyc" -delete

      - name: Run tests
        run: pytest -q

      - name: Show consensus receipts
        if: always()
        run: |
          echo "=== CONSENSUS ==="
          grep -R "consensus_mode" demo_target/.buildout_receipts || true

      - name: Upload buildout receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildout-receipts
          path: demo_target/.buildout_receipts/*.json
          if-no-files-found: warn
